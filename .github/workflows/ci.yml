name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up vcan for integration tests
        continue-on-error: true
        run: |
          sudo modprobe vcan || echo "vcan module not available (Azure kernel), skipping"
          sudo ip link add dev vcan0 type vcan 2>/dev/null || true
          sudo ip link set up vcan0 2>/dev/null || true

      - name: Generate
        run: go generate ./pgn/...

      - name: Test
        run: go test ./... -v -count=1 -race

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./pgn/...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10
