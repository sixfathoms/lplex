name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./pgn/...

      - name: Test
        run: go test ./... -v -count=1 -race

      - name: Vet
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate
        run: go generate ./pgn/...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10

  benchmark:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Generate (PR)
        run: go generate ./pgn/...

      - name: Benchmark PR branch
        run: go test -bench=. -benchtime=250ms -count=3 -run=^$ -benchmem ./... 2>/dev/null > new.txt

      - name: Benchmark base branch
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          go generate ./pgn/...
          go test -bench=. -benchtime=250ms -count=3 -run=^$ -benchmem ./... 2>/dev/null > old.txt
          git checkout -

      - name: Compare benchmarks
        id: benchstat
        run: |
          result=$(benchstat old.txt new.txt 2>&1) || true
          {
            echo 'result<<EOF'
            echo "$result"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post benchmark comparison
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## Benchmark comparison (vs base branch)',
              '',
              '```',
              `${{ steps.benchstat.outputs.result }}`,
              '```',
              '',
              '<sub>Generated by benchstat with 3 iterations (250ms each). Only statistically significant changes (p < 0.05) are flagged.</sub>',
            ].join('\n');

            // Find existing benchmark comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchmark comparison')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
