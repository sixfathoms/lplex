version: 2

before:
  hooks:
    - go generate ./pgn/...

builds:
  - id: lplex-server
    main: ./cmd/lplex-server
    binary: lplex-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: lplex
    main: ./cmd/lplex
    binary: lplex
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: lplex-cloud
    main: ./cmd/lplex-cloud
    binary: lplex-cloud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: lplex-server
    ids:
      - lplex-server
    name_template: "lplex-server_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: lplex-client
    ids:
      - lplex
    name_template: "lplex_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

  - id: lplex-cloud-archive
    ids:
      - lplex-cloud
    name_template: "lplex-cloud_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

nfpms:
  - id: lplex-deb
    package_name: lplex
    ids:
      - lplex-server
      - lplex
    vendor: Theo Zourzouvillys
    homepage: https://github.com/sixfathoms/lplex
    maintainer: Theo Zourzouvillys
    description: CAN bus HTTP bridge for NMEA 2000
    license: MIT
    formats:
      - deb
    contents:
      - src: packaging/lplex-server.service
        dst: /lib/systemd/system/lplex-server.service
      - src: packaging/lplex-server.default
        dst: /etc/default/lplex-server
        type: config
      - src: packaging/lplex-server.logrotate
        dst: /etc/logrotate.d/lplex-server
        type: config
    scripts:
      postinstall: packaging/postinstall.sh

brews:
  - ids:
      - lplex-client
    name: lplex
    repository:
      owner: sixfathoms
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: https://github.com/sixfathoms/lplex
    description: NMEA 2000 CAN bus multi-tool CLI
    license: MIT
    install: |
      bin.install "lplex"

dockers_v2:
  - ids:
      - lplex-server
      - lplex
    images:
      - "ghcr.io/sixfathoms/lplex"
    tags:
      - "{{ .Version }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
