# Example lplex-server config with S3 archival.
#
# This configuration:
#   - Records journals to /var/log/lplex/
#   - Rotates hourly (or at 256 MB)
#   - Keeps at least 24h locally, deletes after 7 days
#   - Caps total local size at 10 GB
#   - Archives to S3 immediately on rotation
#   - Falls back to deleting unarchived files if S3 is unreachable

interface = can0
port = 8089

journal {
  dir = /var/log/lplex
  prefix = nmea2k
  block-size = 262144
  compression = zstd

  rotate {
    duration = PT1H
    size = 268435456  # 256 MB
  }

  retention {
    max-age = P7D         # delete files older than 7 days
    min-keep = PT24H      # always keep at least 24h
    max-size = 10737418240  # 10 GB hard cap
    soft-pct = 80         # start proactive archiving at 8 GB
    overflow-policy = delete-unarchived
  }

  archive {
    command = /usr/local/bin/archive-to-s3.sh
    trigger = on-rotate
  }
}

device {
  idle-timeout = 5m
}
